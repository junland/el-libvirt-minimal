name: Build RPM Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest

    strategy:
      matrix:
        el_version: [9]
        el_flavor: [rocky]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create workspace directory
      run: mkdir -vp workspace/{RPMS,SRPMS,SOURCES,SPECS}

    - name: Copy spec file
      run: cp ${{ matrix.el_flavor }}${{ matrix.el_version }}/*.spec workspace/SPECS/

    - name: Build Docker image
      run: |
        docker build \
               --build-arg EL_VERSION=${{ matrix.el_version }} \
               --build-arg HOST_WORKSPACE_DIR=workspace \
               --build-arg SPEC_FILE=libvirt.spec \
               -t rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }} .

    - name: Grab artifacts from container
      run: |
        CONTAINER_ID=$(docker create rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }})
        docker cp $CONTAINER_ID:/home/builder/rpmbuild/RPMS ./workspace/RPMS
        docker cp $CONTAINER_ID:/home/builder/rpmbuild/SRPMS ./workspace/SRPMS
        docker rm $CONTAINER_ID 

    - name: List built packages
      run: |
        find ./workspace/RPMS ./workspace/SRPMS -name "*.rpm" -type f -exec ls -la {} \;

    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-${{ matrix.el_flavor }}${{ matrix.el_version }}
        path: |
          ./workspace/RPMS
          ./workspace/SRPMS
        retention-days: 30