name: Build RPM Package

on:
  push:
    branches: [ main, dev, copilot/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CONTAINER_RUN_NAME: "rpm-builder-${{ matrix.el_flavor }}${{ matrix.el_version }}-${{ github.run_id }}-${{ github.run_attempt }}"

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        el_version: [9]
        el_flavor: [rocky]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create workspace directory
      run: mkdir -vp workspace/{RPMS,SRPMS}

    - name: Prepare build context
      run: |
        mkdir -vp build-context/{SOURCES,SPECS}
        cp ${{ matrix.el_flavor }}${{ matrix.el_version }}/*.spec build-context/SPECS/
        cp -r ${{ matrix.el_flavor }}${{ matrix.el_version }}/SOURCES/* build-context/SOURCES/
        cp build-rpms.sh build-context/

    - name: Build Docker image
      run: |
        docker build \
               --build-arg EL_VERSION=${{ matrix.el_version }} \
               --build-arg SPEC_FILE=libvirt.spec \
               -f Dockerfile \
               -t rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }} build-context

    - name: Run builder container
      run: |
        docker run -t --name "$CONTAINER_RUN_NAME" rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }}
        docker wait "$CONTAINER_RUN_NAME"

    - name: Copy built packages from container
      run: |
        docker cp "$CONTAINER_RUN_NAME":/root/rpmbuild/RPMS/. ~/rpmbuild/RPMS/
        docker cp "$CONTAINER_RUN_NAME":/root/rpmbuild/SRPMS/. ~/rpmbuild/SRPMS/
        docker rm "$CONTAINER_RUN_NAME"

    - name: List built packages for upload
      run: |
        find ./workspace/RPMS ./workspace/SRPMS -name "*.rpm" -type f -exec ls -la {} \;

    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-el${{ matrix.el_version }}
        path: ~/rpmbuild/RPMS/
        retention-days: 30

    - name: Upload SRPMS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: srpms-el${{ matrix.el_version }}
        path: ~/rpmbuild/SRPMS/
        retention-days: 30