name: Build RPM Package

on:
  push:
    branches: [ main, dev, copilot/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        el_version: [9]
        el_flavor: [rocky]
    env:
      CONTAINER_RUN_NAME: rpm-builder-run-${{ matrix.el_flavor }}${{ matrix.el_version }}-${{ github.run_id }}-${{ github.run_attempt }}
      BUILD_CONTEXT: ${{ github.workspace }}/build-context

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Create workspace directory
      run: mkdir -vp ${{ env.BUILD_CONTEXT }}/{RPMS,SRPMS,SOURCES,SPECS}

    - name: Prepare build context
      run: |
        cp ${{ matrix.el_flavor }}${{ matrix.el_version }}/*.spec "${{ env.BUILD_CONTEXT }}/SPECS/"
        cp -r ${{ matrix.el_flavor }}${{ matrix.el_version }}/SOURCES/* "${{ env.BUILD_CONTEXT }}/SOURCES/"
        cp -v *.sh "${{ env.BUILD_CONTEXT }}"

    - name: Build Docker image
      run: |
        docker build \
               --build-arg EL_VERSION=${{ matrix.el_version }} \
               --build-arg SPEC_FILE=libvirt.spec \
               -f Dockerfile \
               -t rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }} "${{ env.BUILD_CONTEXT }}"

    - name: Run builder container
      run: |
        docker run -t --name "$CONTAINER_RUN_NAME" rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }}
        docker wait "$CONTAINER_RUN_NAME"

    - name: Copy built packages from container
      run: |
        docker cp "$CONTAINER_RUN_NAME":/home/builder/rpmbuild/RPMS/. "${{ env.BUILD_CONTEXT }}/RPMS/"
        docker cp "$CONTAINER_RUN_NAME":/home/builder/rpmbuild/SRPMS/. "${{ env.BUILD_CONTEXT }}/SRPMS/"
        docker rm "$CONTAINER_RUN_NAME"

    - name: List built packages for upload
      run: |
        find "${{ env.BUILD_CONTEXT }}/SRPMS" "${{ env.BUILD_CONTEXT }}/RPMS" -name "*.rpm" -type f -exec ls -la {} \;

    - name: Upload SRPMS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: srpms-el${{ matrix.el_version }}
        path: "${{ env.BUILD_CONTEXT }}/SRPMS/"
        retention-days: 30

    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-el${{ matrix.el_version }}
        path: "${{ env.BUILD_CONTEXT }}/RPMS/"
        retention-days: 30