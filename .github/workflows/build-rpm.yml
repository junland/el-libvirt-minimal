name: Build RPM Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        el_version: [8, 9]
    
    container:
      image: quay.io/centos/centos:stream${{ matrix.el_version }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install build dependencies
      run: |
        dnf install -y rpm-build rpmdevtools tar gzip
        rpmdev-setuptree
        
    - name: Prepare build environment
      run: |
        # Copy spec file to rpmbuild directory
        cp el-libvirt-minimal.spec ~/rpmbuild/SPECS/
        
        # Create source tarball
        mkdir -p /tmp/el-libvirt-minimal-1.0.0
        cp -r * /tmp/el-libvirt-minimal-1.0.0/ 2>/dev/null || true
        cd /tmp
        tar czf ~/rpmbuild/SOURCES/el-libvirt-minimal-1.0.0.tar.gz el-libvirt-minimal-1.0.0/
        
    - name: Build source RPM
      run: |
        rpmbuild -bs ~/rpmbuild/SPECS/el-libvirt-minimal.spec
        
    - name: Build binary RPM
      run: |
        rpmbuild -bb ~/rpmbuild/SPECS/el-libvirt-minimal.spec
        
    - name: List built packages
      run: |
        find ~/rpmbuild -name "*.rpm" -type f -exec ls -la {} \;
        
    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-el${{ matrix.el_version }}
        path: |
          ~/rpmbuild/RPMS/**/*.rpm
          ~/rpmbuild/SRPMS/*.rpm
        retention-days: 30
        
    - name: Upload to Release (on release)
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ~/rpmbuild/RPMS/noarch/el-libvirt-minimal-1.0.0-1.el${{ matrix.el_version }}.noarch.rpm
        asset_name: el-libvirt-minimal-1.0.0-1.el${{ matrix.el_version }}.noarch.rpm
        asset_content_type: application/x-rpm