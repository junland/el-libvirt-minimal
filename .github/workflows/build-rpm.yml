name: Build RPM Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest

    strategy:
      matrix:
        el_version: [9]

    container:
      image: quay.io/rockylinux/rockylinux:${{ matrix.el_version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Enable CRB repository
      run: |
        dnf install -y dnf-plugins-core
        dnf config-manager --set-enabled crb
        dnf clean all

    - name: Install build dependencies
      run: |
        dnf install -y rpm-build rpmdevtools tar gzip 

    - name: Add non-root user for building
      run: |
        useradd -m builder
        chown -R builder:builder /home/builder
        chown -R builder:builder /github/workspace
        
    - name: Prepare build environment files
      run: |
        # Ensure rpmbuild directories exist
        mkdir -vp /home/builder/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}

        # Copy spec file to rpmbuild directory
        cp -v rocky${{ matrix.el_version }}/libvirt.spec /home/builder/rpmbuild/SPECS/

        # Copy source files to SOURCES directory
        cp -rv rocky${{ matrix.el_version }}/SOURCES/* /home/builder/rpmbuild/SOURCES/

    - name: Download additional sources
      run: |
        # Download additional sources if needed
        spectool -g -R /home/builder/rpmbuild/SPECS/libvirt.spec

    - name: Install build dependencies from spec file
      run: |
        dnf builddep -y /home/builder/rpmbuild/SPECS/libvirt.spec
        
    - name: Build source RPM
      run: |
        su builder -s /bin/bash -c "rpmbuild -bs /home/builder/rpmbuild/SPECS/libvirt.spec"
        
    - name: Build binary RPM
      run: |
        su builder -s /bin/bash -c "rpmbuild -bb /home/builder/rpmbuild/SPECS/libvirt.spec"
        
    - name: List built packages
      run: |
        find /home/builder/rpmbuild -name "*.rpm" -type f -exec ls -la {} \;

    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-el${{ matrix.el_version }}
        path: |
          /home/builder/rpmbuild/RPMS
          /home/builder/rpmbuild/SRPMS
        retention-days: 30