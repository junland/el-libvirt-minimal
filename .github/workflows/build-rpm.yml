name: Build RPM Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest

    strategy:
      matrix:
        el_version: [9]
        el_flavor: [rocky]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create workspace directory
      run: mkdir -vp workspace/{RPMS,SRPMS}

    - name: Prepare build context
      run: |
        mkdir -vp build-context/{SOURCES,SPECS}
        cp ${{ matrix.el_flavor }}${{ matrix.el_version }}/*.spec build-context/SPECS/
        cp -r ${{ matrix.el_flavor }}${{ matrix.el_version }}/SOURCES/* build-context/SOURCES/
        cp build-rpms.sh build-context/

    - name: Build Docker image
      run: |
        docker build \
               --build-arg EL_VERSION=${{ matrix.el_version }} \
               --build-arg SPEC_FILE=libvirt.spec \
               -f Dockerfile \
               -t rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }} build-context

    - name: Run builder container
      run: |
        CONTAINER_NAME="rpm-builder-${{ matrix.el_flavor }}${{ matrix.el_version }}-${{ github.run_id }}-${{ github.run_attempt }}"
        docker run -d -t --name "$CONTAINER_NAME" rpm-builder:${{ matrix.el_flavor }}${{ matrix.el_version }}
        docker wait "$CONTAINER_NAME"
        echo "CONTAINER_NAME=$CONTAINER_NAME" >> $GITHUB_ENV

    - name: Extract artifacts from container
      run: |
        docker cp $CONTAINER_NAME:/home/builder/rpmbuild/RPMS ./workspace/RPMS
        docker cp $CONTAINER_NAME:/home/builder/rpmbuild/SRPMS ./workspace/SRPMS
        docker rm $CONTAINER_NAME

    - name: List built packages
      run: |
        find ./workspace/RPMS ./workspace/SRPMS -name "*.rpm" -type f -exec ls -la {} \;

    - name: Upload RPM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpms-${{ matrix.el_flavor }}${{ matrix.el_version }}
        path: |
          ./workspace/RPMS
          ./workspace/SRPMS
        retention-days: 30